server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compresion de textos servidos.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Assets con hash en el nombre (index-XXXX.js): cache larga e inmutable.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # SPA: cualquier ruta desconocida devuelve index.html para que react-router
    # resuelva en el cliente (sin esto, refrescar /llamadas daria 404).
    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        # Panel interno: que no lo indexen los buscadores.
        add_header X-Robots-Tag "noindex, nofollow" always;
    }
}
